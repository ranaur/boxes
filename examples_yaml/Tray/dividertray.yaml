# Generated YAML configuration for DividerTray
# Full format with Defaults and Boxes sections
# This file can be used with boxes_generator.py or the build command

Defaults:
    # reference: 0

Boxes:
  - box_type: DividerTray
    name: "DividerTray_example"
    generate: true
    args:
      ### Settings for Finger Joints
      ## height of the bottom lips sticking out  (multiples of thickness) FingerHoleEdge only!
      # FingerJoint_bottom_lip: 0.0
      ## space below holes of FingerHoleEdge (multiples of thickness)
      # FingerJoint_edge_width: 1.0
      ## extra material to grind away burn marks (multiples of thickness)
      # FingerJoint_extra_length: 0.0
      ## width of the fingers (multiples of thickness)
      # FingerJoint_finger: 2.0
      ## extra space to allow finger move in and out (multiples of thickness)
      # FingerJoint_play: 0.0
      ## space between fingers (multiples of thickness)
      # FingerJoint_space: 2.0
      ## style of the fingers
      ## Valid values: rectangular, springs, barbs, snap
      # FingerJoint_style: "rectangular"
      ## space at the start and end in multiple of normal spaces
      # FingerJoint_surroundingspaces: 2.0
      ## width of finger holes (multiples of thickness)
      # FingerJoint_width: 1.0

      ### Settings for HandleEdge
      ## height above the wall in mm
      # HandleEdge_height: 20.0
      ## height of hole(s) in percentage of maximum hole height (handle height - 2 * material thickness)
      # HandleEdge_hole_height: 75.0
      ## width of hole(s) in percentage of maximum hole width (width of edge - (n+1) * material thickness)
      # HandleEdge_hole_width: "40:40"
      ## added to side panels if checked, to front and back otherwise (only used with top_edge parameter)
      # HandleEdge_on_sides: true
      ## extend the handle along the length of the edge (multiples of thickness)
      # HandleEdge_outset: 1.0
      ## radius of corners in mm
      # HandleEdge_radius: 10.0

      ### Settings for the Lid
      ## height of the brim in multiple of thickness (for flatbrim lids)
      # Lid_brim_height: 1.0
      ## space between the brim and the walls (for flatbrim lids)
      # Lid_brim_spacing: 0.15
      ## size of the fangs in multiples of thickness (for fangbrim lids)
      # Lid_fang_size: 1.0
      ## type of handle
      ## Valid values: none, long_rounded, long_trapezoid, long_doublerounded, knob
      # Lid_handle: "none"
      ## height of the handle in multiples of thickness (if applicable)
      # Lid_handle_height: 8.0
      ## height of the brim in multiples of thickness (if any)
      # Lid_height: 4.0
      ## play when sliding the lid on in multiples of thickness (if applicable)
      # Lid_play: 0.1
      ## type of lid to create
      ## Valid values: none, flat, chest, overthetop, ontop, flatbrim, fangbrim
      # Lid_style: "none"

      ### Settings for Divider Slots
      ## angle at which slots are generated, in degrees. 0° is vertical.
      # Slot_angle: 0
      ## depth of the slot in mm
      # Slot_depth: 20
      ## extra slack (in addition to thickness and kerf) to help insert dividers in mm
      # Slot_extra_slack: 0.2
      ## radius of the slot entrance in mm
      # Slot_radius: 2

      ### Settings for Notches on the Dividers
      # Notch_depth: 15
      # Notch_lower_radius: 8
      # Notch_upper_radius: 1

      ### Settings for Dividers
      ## margin between box's bottom and divider's in mm
      # Divider_bottom_margin: 0
      ## play to avoid them clamping onto the walls (in multiples of thickness)
      # Divider_play: 0.05

      ### DividerTray Settings
      ## generate wall on the bottom
      # bottom: false
      ## inner height in mm (unless outside selected)
      # h: 100.0
      ## add handle to the bottom
      # handle: false
      ## generate wall on the left side
      # left_wall: true
      ## generate the same notches on the walls that are on the dividers
      # notches_in_wall: true
      ## treat sizes as outside measurements [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#outside)
      # outside: true
      ## generate wall on the right side
      # right_wall: true
      ## sections left to right in mm [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#section-parameters)
      # sx: "50*3"
      ## sections back to front in mm [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#section-parameters)
      # sy: "50*3"

      ### Default Settings
      ## burn correction (in mm)(bigger values for tighter fit) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#burn)
      # burn: 0.1
      ## print surrounding boxes for some structures [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#debug)
      # debug: false
      ## format of resulting file [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#format)
      # format: "svg"
      ## style for inner corners [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#inner-corners)
      # inner_corners: "loop"
      ## label the parts (where available)
      # labels: true
      ## Add a QR Code with link or command line to the generated output
      # qr_code: false
      ## print reference rectangle with given length (in mm)(zero to disable) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#reference)
      # reference: 100.0
      ## spacing around parts (multiples of thickness [: extra space in mm]) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#spacing)
      # spacing: "0.5"
      ## width of tabs holding the parts in place (in mm)(not supported everywhere) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#tabs)
      # tabs: 0.0
      ## thickness of the material (in mm) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#thickness)
      # thickness: 3.0
