# Generated YAML configuration for Gears
# Full format with Defaults and Boxes sections
# This file can be used with boxes_generator.py or the build command

Defaults:
    # reference: 0

Boxes:
  - box_type: Gears
    name: "Gears_example"
    generate: true
    args:
      ### Gears Settings
      ## percent of the D section of shaft 1 (100 for round shaft)
      # dpercentage1: 75
      ## percent of the D section of shaft 1 (0 for same as shaft 1)
      # dpercentage2: 0
      ## size of teeth (diameter / #teeth) in mm
      # modulus: 2
      ## angle of the teeth touching (in degrees)
      # pressure_angle: 20
      ## in percent of the modulus
      # profile_shift: 20
      ## diameter of the shaft 1
      # shaft1: 6.0
      ## diameter of the shaft2 (zero for same as shaft 1)
      # shaft2: 0.0
      ## number of teeth
      # teeth1: 12
      ## number of teeth in the other size of gears
      # teeth2: 32

      ### Default Settings
      ## burn correction (in mm)(bigger values for tighter fit) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#burn)
      # burn: 0.1
      ## print surrounding boxes for some structures [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#debug)
      # debug: false
      ## format of resulting file [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#format)
      # format: "svg"
      ## style for inner corners [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#inner-corners)
      # inner_corners: "loop"
      ## label the parts (where available)
      # labels: true
      ## Add a QR Code with link or command line to the generated output
      # qr_code: false
      ## print reference rectangle with given length (in mm)(zero to disable) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#reference)
      # reference: 100.0
      ## spacing around parts (multiples of thickness [: extra space in mm]) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#spacing)
      # spacing: "0.5"
      ## width of tabs holding the parts in place (in mm)(not supported everywhere) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#tabs)
      # tabs: 0.0
      ## thickness of the material (in mm) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#thickness)
      # thickness: 3.0
