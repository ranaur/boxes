# Generated YAML configuration for PhotoFrame
# Full format with Defaults and Boxes sections
# This file can be used with boxes_generator.py or the build command

Defaults:
    # reference: 0

Boxes:
  - box_type: PhotoFrame
    name: "PhotoFrame_example"
    generate: true
    args:
      ### Settings for Mounting Edge
      ## head diameter of mounting screw (in mm)
      # Mounting_d_head: 8.0
      ## shaft diameter of mounting screw (in mm)
      # Mounting_d_shaft: 4.0
      ## minimum space left and right without holes (fraction of the edge length)
      # Mounting_margin: 0.125
      ## number of mounting holes (integer)
      # Mounting_num: 3
      ## side of box (not all valid configurations make sense...)
      # Mounting_side: "back"
      ## edge style
      # Mounting_style: "straight edge, within"

      ### Settings for Dove Tail Joints
      ## how much should fingers widen (-80 to 80)
      # DoveTail_angle: 50
      ## how far the dove tails stick out of/into the edge (multiples of thickness)
      # DoveTail_depth: 1.0
      ## radius used on all four corners (multiples of thickness)
      # DoveTail_radius: 0.2
      ## from one middle of a dove tail to another (multiples of thickness)
      # DoveTail_size: 2

      ### PhotoFrame Settings
      ## Frame overlap to hold the matting/glass in place
      # frame_overlap: 5.0
      ## Width of the frame border around the matting
      # frame_w: 20.0
      ## Height of the pre-cut glass or acrylic
      # glass_h: 0
      ## Width of the pre-cut glass or acrylic
      # glass_w: 0
      ## Use golden ratio to calculate matting width
      # golden_mat: true
      ## Clearance in the guide pocket to help slide the matting/glass in
      # guide_fudge: 2.0
      ## Width of the matting border around top/bottom of the photo
      # matting_h: 0
      ## Matting overlap of the photo, e.g. 2mm if photo has border, 5mm if not
      # matting_overlap: 2
      ## Width of the matting border around the sides of the photo
      # matting_w: 0
      ## Split front into thin rectangles to save material
      # split_front: true
      ## Width of the photo, not including any border
      # x: 100
      ## Height of the photo, not including any border
      # y: 150

      ### Default Settings
      ## burn correction (in mm)(bigger values for tighter fit) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#burn)
      # burn: 0.1
      ## print surrounding boxes for some structures [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#debug)
      # debug: false
      ## format of resulting file [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#format)
      # format: "svg"
      ## style for inner corners [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#inner-corners)
      # inner_corners: "loop"
      ## label the parts (where available)
      # labels: true
      ## Add a QR Code with link or command line to the generated output
      # qr_code: false
      ## print reference rectangle with given length (in mm)(zero to disable) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#reference)
      # reference: 100.0
      ## spacing around parts (multiples of thickness [: extra space in mm]) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#spacing)
      # spacing: "0.5"
      ## width of tabs holding the parts in place (in mm)(not supported everywhere) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#tabs)
      # tabs: 0.0
      ## thickness of the material (in mm) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#thickness)
      # thickness: 3.0
