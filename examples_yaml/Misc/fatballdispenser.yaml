# Generated YAML configuration for FatBallDispenser
# Full format with Defaults and Boxes sections
# This file can be used with boxes_generator.py or the build command

Defaults:
    # reference: 0

Boxes:
  - box_type: FatBallDispenser
    name: "FatBallDispenser_example"
    generate: true
    args:
      ### FatBallDispenser Settings
      ## The height of the balcony in mm. Set to 0 if no walls are needed.
      # balcony_height: 20.0
      ## The width of the area outside of the poles.
      # balcony_width: 15.0
      ## The diameter of the fat balls. Give some extra mm to make it a loose fit
      # ball_diameter: 75.0
      ## The diameter of the hole of the floor (to drain rainwater)
                    in mm. Set to 0 if you don't need it.
      # drain_hole_diameter: 5.0
      ## The minimum distance between a pole and the central
                    refill hole in the ceiling in mm.
      # pole_clearance: 9.0
      ## The fraction of the pole clearance which is being used for
                    the locking mechanism.
      # pole_clearance_factor: 0.9
      ## The diameter of the poles.
      # pole_diameter: 8.0
      ## The height of the roof in mm.
      # roof_height: 50.0
      ## The diameter of the hole of the roof in mm.
                    Set to 0 if you don't want to attach a hanger.
      # roof_hole_diameter: 5.0
      ## The distance from on bottom corner of the roof to the maintenance hole in mm.
      # roof_maintenance_clearance: 20.0
      ## Defines how much wider than the bottom floor the roof is.
      # roof_overhang: 20.0
      ## The radius of the roof support part as a fraction of the roof radius.
      # roof_support_fraction: 0.3
      ## The number of sides of the floor plan.
      # sides: 6
      ## The gap between the parts that slide into each other
                    in the locking mechanism in mm.
      # slide_clearance: 1.0
      ## The width of the spacer (part of the locking mechanism) in mm.
      # spacer_width: 15.0

      ### Default Settings
      ## burn correction (in mm)(bigger values for tighter fit) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#burn)
      # burn: 0.1
      ## print surrounding boxes for some structures [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#debug)
      # debug: false
      ## format of resulting file [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#format)
      # format: "svg"
      ## style for inner corners [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#inner-corners)
      # inner_corners: "loop"
      ## label the parts (where available)
      # labels: true
      ## Add a QR Code with link or command line to the generated output
      # qr_code: false
      ## print reference rectangle with given length (in mm)(zero to disable) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#reference)
      # reference: 100.0
      ## spacing around parts (multiples of thickness [: extra space in mm]) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#spacing)
      # spacing: "0.5"
      ## width of tabs holding the parts in place (in mm)(not supported everywhere) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#tabs)
      # tabs: 0.0
      ## thickness of the material (in mm) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#thickness)
      # thickness: 3.0
