# Generated YAML configuration for Sphere
# Full format with Defaults and Boxes sections
# This file can be used with boxes_generator.py or the build command

Defaults:
    # reference: 0

Boxes:
  - box_type: Sphere
    name: "Sphere_example"
    generate: true
    args:
      ### Sphere Settings
      ## The amount of gores/parts you want the sphere to have, has to be at least 3
      # amount_gores: 6
      ## The size of the polygonal hole at the bottom
      # bottom_hole_radius: 80
      ## A hook to hang the sphere on a cable (for e.g. lamps), the amount of gores that have a hook
      # cable_hook: 0
      ## The radius of the cable for the cable hook
      # cable_hook_radius: 3
      ## The length of the tabs on the corners (in mm)(not supported everywhere). Keep as small as your material strength allows for cleaner result
      # corner_tab: 10.0
      ## Add scoring lines to easier fold tabs
      # scoring_lines: false
      ## The radius of the assembled sphere
      # sphere_radius: 100
      ## The width of the tabs (in mm)
      # tab_width: 5.0
      ## The size of the circular hole at the top
      # top_hole_radius: 30

      ### Default Settings
      ## burn correction (in mm)(bigger values for tighter fit) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#burn)
      # burn: 0.1
      ## print surrounding boxes for some structures [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#debug)
      # debug: false
      ## format of resulting file [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#format)
      # format: "svg"
      ## style for inner corners [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#inner-corners)
      # inner_corners: "loop"
      ## label the parts (where available)
      # labels: true
      ## Add a QR Code with link or command line to the generated output
      # qr_code: false
      ## print reference rectangle with given length (in mm)(zero to disable) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#reference)
      # reference: 100.0
      ## spacing around parts (multiples of thickness [: extra space in mm]) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#spacing)
      # spacing: "0.5"
      ## The number of tabs. This has to be an even number
      # tabs: 6
      ## thickness of the material (in mm) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#thickness)
      # thickness: 1.0
