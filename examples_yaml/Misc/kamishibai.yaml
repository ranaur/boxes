# Generated YAML configuration for Kamishibai
# Full format with Defaults and Boxes sections
# This file can be used with boxes_generator.py or the build command

Defaults:
    # reference: 0

Boxes:
  - box_type: Kamishibai
    name: "Kamishibai_example"
    generate: true
    args:
      ### Settings for Finger Joints
      ## height of the bottom lips sticking out  (multiples of thickness) FingerHoleEdge only!
      # FingerJoint_bottom_lip: 0.0
      ## space below holes of FingerHoleEdge (multiples of thickness)
      # FingerJoint_edge_width: 1.0
      ## extra material to grind away burn marks (multiples of thickness)
      # FingerJoint_extra_length: 0.0
      ## width of the fingers (multiples of thickness)
      # FingerJoint_finger: 2.0
      ## extra space to allow finger move in and out (multiples of thickness)
      # FingerJoint_play: 0.0
      ## space between fingers (multiples of thickness)
      # FingerJoint_space: 2.0
      ## style of the fingers
      ## Valid values: rectangular, springs, barbs, snap
      # FingerJoint_style: "rectangular"
      ## space at the start and end in multiple of normal spaces
      # FingerJoint_surroundingspaces: 1.5
      ## width of finger holes (multiples of thickness)
      # FingerJoint_width: 1.0

      ### Settings for Slide-on Lids
      ## height of the bottom lips sticking out  (multiples of thickness) FingerHoleEdge only!
      # SlideOnLid_bottom_lip: 0.0
      ## space below holes of FingerHoleEdge (multiples of thickness)
      # SlideOnLid_edge_width: 1.0
      ## extra material to grind away burn marks (multiples of thickness)
      # SlideOnLid_extra_length: 0.0
      ## width of the fingers (multiples of thickness)
      # SlideOnLid_finger: 3.0
      ## width of the "finger hole" in mm
      # SlideOnLid_hole_width: 15
      ## extra space to allow finger move in and out (multiples of thickness)
      # SlideOnLid_play: 0.1
      ## additional pin for better positioning
      # SlideOnLid_second_pin: true
      ## space between fingers (multiples of thickness)
      # SlideOnLid_space: 2.0
      ## position(s) of the extra locking springs in the lid
      # SlideOnLid_spring: "none"
      ## style of the fingers
      # SlideOnLid_style: "rectangular"
      ## space at the start and end in multiple of normal spaces
      # SlideOnLid_surroundingspaces: 2.0
      ## width of finger holes (multiples of thickness)
      # SlideOnLid_width: 1.0

      ### Settings for Hinges and HingePins
      ## diameter of the pin hole (multiples of thickness)
      # Hinge_axle: 2.5
      ## fixed length of the grips on he lids (multiples of thickness)
      # Hinge_grip_length: 0
      # Hinge_grip_percentage: 0
      ## thickness of the arc holding the pin in place (multiples of thickness)
      # Hinge_hingestrength: 1
      ## have lid overlap at the sides (similar to OutSetEdge)
      # Hinge_outset: true
      ## set to lower value to get disks surrounding the pins
      # Hinge_pinwidth: 0.4

      ### Kamishibai front cover
      ## style of the front cover
      # FrontCoverStyle: "two-part lid with hinge eyes (both ends)"
      ## Front extra depth (for attaching hinges for example), in multiples of thickness ; set to 0 to ignore or let the system calculate the smallest one
      # FrontExtraDepth: 4
      ## Add front extra locks at the top and bottom
      # FrontExtraTopAndBottomLocks: true
      ## style of the front lock
      # FrontLockStyle: "with key"

      ### Kamishibai 3 pane cover hinge holes
      ## distance of the box holes from the edge to the holes centers in mm
      # HingeHolesBoxEdgeDistance: 7.0
      ## separation of the box holes from one another's center in mm (section parameter type) ; the first item is the distance from the border
      # HingeHolesBoxSeparation: "15.0:30.0"
      ## distance of the cover holes from the edge to the holes centers in mm
      # HingeHolesCoverEdgeDistance: 5.5
      ## separation of the cover holes from one another's center in mm (section parameter type) ; the first item is the distance from the border
      # HingeHolesCoverSeparation: "24.0:12.0"
      ## Hinge hole diameter in mm (set to 0 for no holes)
      # HingeHolesDiameter: 2.5

      ### Screws parameters for attaching the pieces together
      ## Length of the bottom locking screws in mm
      # BottomLockScrewLength: 13.0
      ## Length of the door feet screws in mm (set to 0 for no screws)
      # DoorFeetScrewLength: 16.0
      ## Thickness of the locking nuts in mm
      # LockNutThickness: 2.4
      ## Width of the locking nuts in mm
      # LockNutWidth: 5.5
      ## Diameter of the screw holes in mm (set to 0 for no screws)
      # LockScrewDiameter: 0.0
      ## Distance of the screw axis from the side border (in multiples of thickness)
      # LockScrewDistanceFromBorder: 11
      ## Distance from the border for the axis of the extra feet at the corners, in mm (set to 0 for no screws)
      # LockScrewExtraFeetDistanceFromBorder: 7.0
      ## Diameter of the screw holes for extra feet at the corners, in mm (set to 0 for no screws)
      # LockScrewExtraFeetScewDiameter: 3.0
      ## Length of the top locking screws in mm
      # TopLockScrewLength: 16.0

      ### Kamishibai Settings
      ## Back extra depth (for adding buttons for example), in multiples of thickness ; set to 0 to let the system calculate the smallest one
      # BackExtraDepth: 4
      ## Radius of the frame corners in mm
      # FrameCornerRadius: 5.0
      ## Frame thickness in mm
      # FrameThickness: 20.0
      ## Margin for the top handle in mm (Set to 0 for no margin)
      # HandleMargin: 0.0
      ## Thickness of the top handle in multiples of thickness (Set to 0 for no handle)
      # HandleThickness: 2
      ## Width of the top handle in mm (Set to 0 for no handle) ; the SheetStackDepth should be at least 4 x thickness more
      # HandleWidth: 120.0
      ## Margin for sheets and moving parts in mm
      # Margin: 2.0
      ## Margin for the pegs width in mm ; set to a lower value if the pieces are forced together, a higher value if the pieces slide easily into each other (using screws or glue to assemble)
      # PegsWidthMargin: 0.5
      ## height of the sheets in mm
      # SheetHeight: 210.0
      ## width of the sheets in mm
      # SheetWidth: 297.0
      ## Depth of the sheets stack in mm
      # SheetsStackDepth: 30.0

      ### Default Settings
      ## burn correction (in mm)(bigger values for tighter fit) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#burn)
      # burn: 0.1
      ## print surrounding boxes for some structures [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#debug)
      # debug: false
      ## format of resulting file [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#format)
      # format: "svg"
      ## style for inner corners [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#inner-corners)
      # inner_corners: "loop"
      ## label the parts (where available)
      # labels: true
      ## Add a QR Code with link or command line to the generated output
      # qr_code: false
      ## print reference rectangle with given length (in mm)(zero to disable) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#reference)
      # reference: 100.0
      ## spacing around parts (multiples of thickness [: extra space in mm]) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#spacing)
      # spacing: "0.5"
      ## width of tabs holding the parts in place (in mm)(not supported everywhere) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#tabs)
      # tabs: 0.0
      ## thickness of the material (in mm) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#thickness)
      # thickness: 3.0
