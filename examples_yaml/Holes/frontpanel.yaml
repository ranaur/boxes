# Generated YAML configuration for FrontPanel
# Full format with Defaults and Boxes sections
# This file can be used with boxes_generator.py or the build command

Defaults:
    # reference: 0

Boxes:
  - box_type: FrontPanel
    name: "FrontPanel_example"
    generate: true
    args:
      ### FrontPanel Settings
      # layout: "
outline 100 100
rect 50 60 80 30 3 True False
text 50 91 7 "Super Front Panel With Buttons!" 0 bottom|center
circle 10 45 3.5
circle 30 45 3.5
circle 50 45 3.5
circle 70 45 3.5
circle 90 45 3.5
text 10 40 3 "BTN_1" 0 top|center
text 35 45 3 "BTN_2" 90 top|center
text 50 50 3 "BTN_3" 180 top|center
text 65 45 3 "BTN_4" 270 top|center
text 90 45 3 "5" 0 middle|center
mountinghole 5 85 3 6 90
mountinghole 95 85 3 6 90

# Start another panel, 30x50
outline 30 50
rect 15 25 15 15 1 True True
text 15 25 3 "__Fun!"   0 bottom|left
text 15 25 3 "__Fun!"  45 bottom|left
text 15 25 3 "__Fun!"  90 bottom|left
text 15 25 3 "__Fun!" 135 bottom|left
text 15 25 3 "__Fun!" 180 bottom|left
text 15 25 3 "__Fun!" 225 bottom|left
text 15 25 3 "__Fun!" 270 bottom|left

text 3  10 2 "Another panel, for fun" 0 top|left


# Let's create another panel with a nema motor on it
outline 40 40
nema 20 20 17
"

      ### Default Settings
      ## burn correction (in mm)(bigger values for tighter fit) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#burn)
      # burn: 0.1
      ## print surrounding boxes for some structures [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#debug)
      # debug: false
      ## format of resulting file [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#format)
      # format: "svg"
      ## style for inner corners [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#inner-corners)
      # inner_corners: "loop"
      ## label the parts (where available)
      # labels: true
      ## Add a QR Code with link or command line to the generated output
      # qr_code: false
      ## print reference rectangle with given length (in mm)(zero to disable) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#reference)
      # reference: 100.0
      ## spacing around parts (multiples of thickness [: extra space in mm]) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#spacing)
      # spacing: "0.5"
      ## width of tabs holding the parts in place (in mm)(not supported everywhere) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#tabs)
      # tabs: 0.0
      ## thickness of the material (in mm) [🛈](https://florianfesti.github.io/boxes/html/usermanual.html#thickness)
      # thickness: 3.0
